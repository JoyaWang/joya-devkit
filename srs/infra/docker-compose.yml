services:
  api:
    image: ccr.ccs.tencentyun.com/joyawang/srs-api:${SRS_IMAGE_TAG:-dev-latest}
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - env.runtime
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ccr.ccs.tencentyun.com/joyawang/srs-worker:${SRS_IMAGE_TAG:-dev-latest}
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file:
      - env.runtime
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: srs
      POSTGRES_PASSWORD: srs
      POSTGRES_DB: srs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
