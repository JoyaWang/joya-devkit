name: joya_signin_kit
description: Registration, login, password reset UI kit with legal agreement support for Joya Flutter.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  joya_auth:
    path: ../joya_auth
  joya_http:
    path: ../joya_http
  joya_result:
    path: ../joya_result

dev_dependencies:
  flutter_test:
    sdk: flutter
