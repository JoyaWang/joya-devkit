branch:
  - reg: "^dev$"
    buttons:
      - name: Deploy joya-devkit dev
        description: Build SRS api/worker on CNB, push TCR, deploy dev server
        event: web_trigger_deploy_dev
        inputs:
          force_no_cache:
            name: Force no cache
            description: Use docker build --no-cache
            required: false
            type: switch
            default: "false"
            options:
              - name: "false"
                value: "false"
              - name: "true"
                value: "true"
  - reg: "^(main|release.*)$"
    buttons:
      - name: Deploy joya-devkit prod
        description: Build SRS api/worker on CNB, push TCR, deploy prod server
        event: web_trigger_deploy_prod
        inputs:
          force_no_cache:
            name: Force no cache
            description: Use docker build --no-cache
            required: false
            type: switch
            default: "false"
            options:
              - name: "false"
                value: "false"
              - name: "true"
                value: "true"
