name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      force_no_cache:
        description: "Use --no-cache for docker build"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Record runner info
        run: |
          echo "=== Runner Info ==="
          echo "Runner IP: $(curl -s https://api.ipify.org)"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "GitHub SHA: $GITHUB_SHA"
          echo "GitHub ref: $GITHUB_REF"
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "==================="

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            PROJECT_DIR="/home/ubuntu/apps/joya-devkit/srs"
            BRANCH="main"
            LOG_FILE="$PROJECT_DIR/deploy.log"
            MIN_FREE_KB=$((5 * 1024 * 1024))
            FORCE_NO_CACHE="${{ github.event.inputs.force_no_cache || 'false' }}"
            BUILD_FLAGS=""
            if [ "$FORCE_NO_CACHE" = "true" ]; then
              BUILD_FLAGS="--no-cache"
            fi
            mkdir -p /tmp >/dev/null 2>&1 || true
            : >> "$LOG_FILE" 2>/dev/null || LOG_FILE="/tmp/shared-runtime-services-deploy.log"

            echo "=== Dev deploy started at $(date '+%Y-%m-%d %H:%M:%S') ===" | tee -a $LOG_FILE
            echo "[INFO] Disk usage before cleanup" | tee -a $LOG_FILE
            df -h / | tee -a $LOG_FILE
            echo "[INFO] Docker usage before cleanup" | tee -a $LOG_FILE
            docker system df 2>&1 | tee -a $LOG_FILE || true
            echo "[INFO] Running docker cleanup" | tee -a $LOG_FILE
            docker image prune -af 2>&1 | tee -a $LOG_FILE || true
            docker builder prune -af 2>&1 | tee -a $LOG_FILE || true
            echo "[INFO] Disk usage after cleanup" | tee -a $LOG_FILE
            df -h / | tee -a $LOG_FILE
            echo "[INFO] Docker usage after cleanup" | tee -a $LOG_FILE
            docker system df 2>&1 | tee -a $LOG_FILE || true
            FREE_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [ -z "$FREE_KB" ] || [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
              echo "[FAIL] Free disk below threshold after cleanup: ${FREE_KB:-unknown} KB (< $MIN_FREE_KB KB)" | tee -a $LOG_FILE
              exit 1
            fi
            echo "[OK] Free disk after cleanup: $FREE_KB KB" | tee -a $LOG_FILE

            # 1. Pull latest code
            cd $PROJECT_DIR
            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH
            echo "[OK] Code pulled" | tee -a $LOG_FILE

            # 2. Build images (default uses cache; set workflow input force_no_cache=true when needed)
            docker compose -f infra/docker-compose.yml build $BUILD_FLAGS api worker 2>&1 | tee -a $LOG_FILE
            echo "[OK] Build complete (flags: ${BUILD_FLAGS:-none})" | tee -a $LOG_FILE

            # 3. Restart api and worker (postgres/redis stay running)
            docker compose -f infra/docker-compose.yml up -d --no-deps --build api worker 2>&1 | tee -a $LOG_FILE
            echo "[OK] Services restarted" | tee -a $LOG_FILE

            # 4. Run database migrations inside api container
            docker compose -f infra/docker-compose.yml exec -T api sh -lc 'printenv DATABASE_URL >/dev/null && npx prisma migrate deploy --schema ./prisma/schema.prisma' 2>&1 | tee -a $LOG_FILE
            echo "[OK] Migrations applied" | tee -a $LOG_FILE

            # 4b. Seed project bindings (idempotent upsert via raw SQL)
            docker compose -f infra/docker-compose.yml exec -T api node <<'NODE' 2>&1 | tee -a $LOG_FILE
            const pg = require('pg');
            function upper(v) { return v.replace(/[^a-zA-Z0-9]+/g, '_').toUpperCase(); }
            function requireEnv(env, keys) {
              for (const k of keys) { const v = env[k]; if (v && v.trim()) return v; }
              throw new Error('Missing env: one of ' + keys.join(', '));
            }
            function resolveConfig(projectKey, runtimeEnv, env) {
              const ek = upper(runtimeEnv), pk = upper(projectKey);
              return {
                bucket: requireEnv(env, ['SHARED_'+ek+'_COS_BUCKET', pk+'_'+ek+'_COS_BUCKET', pk+'_COS_BUCKET']),
                region: requireEnv(env, ['SHARED_'+ek+'_COS_REGION', pk+'_'+ek+'_COS_REGION', pk+'_COS_REGION']),
                secretId: requireEnv(env, ['SHARED_'+ek+'_COS_SECRET_ID', pk+'_'+ek+'_COS_SECRET_ID', pk+'_COS_SECRET_ID']),
                secretKey: requireEnv(env, ['SHARED_'+ek+'_COS_SECRET_KEY', pk+'_'+ek+'_COS_SECRET_KEY', pk+'_COS_SECRET_KEY']),
                downloadDomain: requireEnv(env, ['SHARED_'+ek+'_COS_DOWNLOAD_DOMAIN', pk+'_'+ek+'_COS_DOWNLOAD_DOMAIN', pk+'_COS_DOWNLOAD_DOMAIN']),
              };
            }
            async function run() {
              const client = new pg.Client({ connectionString: process.env.DATABASE_URL });
              await client.connect();
              for (const t of [
                { projectKey: 'laicai', runtimeEnv: 'dev' },
                { projectKey: 'laicai', runtimeEnv: 'prd' },
                { projectKey: 'infov', runtimeEnv: 'dev' },
                { projectKey: 'infov', runtimeEnv: 'prd' },
              ]) {
                const config = resolveConfig(t.projectKey, t.runtimeEnv, process.env);
                const configJson = JSON.stringify(config);
                await client.query(
                  `INSERT INTO project_service_bindings (id, project_key, runtime_env, service_type, provider, config, created_at, updated_at)
                   VALUES ($1, $2, $3, 'object_storage', 'cos', $4, NOW(), NOW())
                   ON CONFLICT (project_key, runtime_env, service_type)
                   DO UPDATE SET config = EXCLUDED.config, provider = EXCLUDED.provider, updated_at = NOW()`,
                  [crypto.randomUUID(), t.projectKey, t.runtimeEnv, configJson],
                );
              }
              await client.end();
              console.log('[OK] Seed complete');
            }
            run().catch(e => { console.error('[FAIL] Seed failed:', e.message); process.exit(1); });
            NODE
            echo "[OK] Seed done" | tee -a $LOG_FILE

            # 5. Health check
            sleep 5
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3010/health || echo "000")
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "[OK] Health check passed (HTTP $HTTP_STATUS)" | tee -a $LOG_FILE
            else
              echo "[FAIL] Health check returned HTTP $HTTP_STATUS" | tee -a $LOG_FILE
              docker compose -f infra/docker-compose.yml logs api --tail 20 2>&1 | tee -a $LOG_FILE
              exit 1
            fi

            # 6. Verify worker is running
            WORKER_STATUS=$(docker compose -f infra/docker-compose.yml ps worker --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1 || echo "unknown")
            echo "[INFO] Worker status: $WORKER_STATUS" | tee -a $LOG_FILE

            # 7. Clean up old images
            docker image prune -f 2>&1 | tee -a $LOG_FILE

            echo "=== Dev deploy finished at $(date '+%Y-%m-%d %H:%M:%S') ===" | tee -a $LOG_FILE
