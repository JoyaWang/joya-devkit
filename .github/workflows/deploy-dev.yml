name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      force_no_cache:
        description: "Use --no-cache for docker build"
        required: false
        default: false
        type: boolean
  push:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Record runner info
        run: |
          echo "=== Runner Info ==="
          echo "Runner IP: $(curl -s https://api.ipify.org)"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "GitHub SHA: $GITHUB_SHA"
          echo "GitHub ref: $GITHUB_REF"
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "==================="

      - name: Fetch secrets from Vault
        env:
          VAULT_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN_JOYA_DEVKIT_DEV }}
          INFISICAL_PROJECT_ID_JOYA_DEVKIT: 3d835c43-59e7-4b4f-bf98-466f5585fe53
          OUTPUT_PATH: env.runtime
        run: bash scripts/gen-env-runtime.sh dev

      - name: Upload .env.runtime to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          source: "env.runtime"
          target: "/home/ubuntu/apps/joya-devkit/srs/infra/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /home/ubuntu/apps/joya-devkit
            git fetch origin dev
            git reset --hard origin/dev
            bash srs/scripts/deploy-remote-ssh.sh dev --force-no-cache "${{ github.event.inputs.force_no_cache || 'false' }}"

      - name: Cleanup local secrets artifact
        if: always()
        run: rm -f env.runtime
