name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Record runner info
        run: |
          echo "=== Runner Info ==="
          echo "Runner IP: $(curl -s https://api.ipify.org)"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "GitHub SHA: $GITHUB_SHA"
          echo "GitHub ref: $GITHUB_REF"
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "==================="

      - name: Fetch secrets from Vault
        env:
          VAULT_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN_JOYA_DEVKIT_PROD }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          token = os.environ["VAULT_TOKEN"]
          pid = "3d835c43-59e7-4b4f-bf98-466f5585fe53"
          url = "https://vault.infinex.cn/api"
          env = "prod"
          paths = ["/", "/BE/runtime"]

          secrets_map = {}
          for secret_path in paths:
              api = f"{url}/v3/secrets/raw?workspaceId={pid}&environment={env}&secretPath={secret_path}"
              req = urllib.request.Request(api, headers={"Authorization": f"Bearer {token}"})
              try:
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read())
                      for item in data.get("secrets", []):
                          key = item.get("secretKey") or item.get("key")
                          value = item.get("secretValue") or item.get("value")
                          if key is not None:
                              secrets_map[key] = str(value)
              except Exception as exc:
                  print(f"Warning: failed to fetch {secret_path}: {exc}")

          lines = []
          for key, value in secrets_map.items():
              if "\n" in value:
                  lines.append(f'{key}="{value}"')
              else:
                  lines.append(f"{key}={value}")

          with open("env.runtime", "w") as f:
              f.write("\n".join(lines) + "\n")

          print(f"Wrote {len(secrets_map)} secrets to env.runtime")
          PYEOF

      - name: Upload .env.runtime to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "env.runtime"
          target: "/home/ubuntu/apps/joya-devkit/srs/infra/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            PROJECT_DIR="/home/ubuntu/apps/joya-devkit"
            BRANCH="main"
            LOG_FILE="$PROJECT_DIR/deploy.log"
            mkdir -p /tmp >/dev/null 2>&1 || true
            : >> "$LOG_FILE" 2>/dev/null || LOG_FILE="/tmp/shared-runtime-services-deploy.log"

            echo "=== Deploy started at $(date '+%Y-%m-%d %H:%M:%S') ===" | tee -a $LOG_FILE

            # 1. Pull latest code
            cd $PROJECT_DIR
            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH
            echo "[OK] Code pulled" | tee -a $LOG_FILE

            # 2. Validate runtime env (uploaded by previous SCP step)
            RUNTIME_ENV="$PROJECT_DIR/srs/infra/env.runtime"
            if [ ! -f "$RUNTIME_ENV" ]; then
              echo "[FAIL] Missing env.runtime — Vault secrets not deployed" | tee -a $LOG_FILE
              exit 1
            fi
            bash scripts/check-runtime-env.sh "$RUNTIME_ENV" 2>&1 | tee -a $LOG_FILE

            # 3. Build images
            docker compose -f srs/infra/docker-compose.yml build api worker 2>&1 | tee -a $LOG_FILE
            echo "[OK] Build complete" | tee -a $LOG_FILE

            # 4. Restart api and worker (postgres/redis stay running)
            docker compose -f srs/infra/docker-compose.yml up -d --no-deps --build api worker 2>&1 | tee -a $LOG_FILE
            echo "[OK] Services restarted" | tee -a $LOG_FILE

            # 5. Run database migrations inside api container
            docker compose -f srs/infra/docker-compose.yml exec -T api sh -lc 'printenv DATABASE_URL >/dev/null && npx prisma migrate deploy --schema ./prisma/schema.prisma' 2>&1 | tee -a $LOG_FILE
            echo "[OK] Migrations applied" | tee -a $LOG_FILE

            # 5b. Seed project bindings (idempotent upsert via raw SQL)
            docker compose -f srs/infra/docker-compose.yml exec -T api node <<'NODE' 2>&1 | tee -a $LOG_FILE
            const pg = require('pg');
            function upper(v) { return v.replace(/[^a-zA-Z0-9]+/g, '_').toUpperCase(); }
            function requireEnv(env, keys) {
              for (const k of keys) { const v = env[k]; if (v && v.trim()) return v; }
              throw new Error('Missing env: one of ' + keys.join(', '));
            }
            function resolveConfig(projectKey, runtimeEnv, env) {
              const pk = upper(projectKey);
              return {
                bucket: requireEnv(env, [pk+'_COS_BUCKET', 'COS_BUCKET']),
                region: requireEnv(env, [pk+'_COS_REGION', 'COS_REGION']),
                secretId: requireEnv(env, [pk+'_COS_SECRET_ID', 'COS_SECRET_ID']),
                secretKey: requireEnv(env, [pk+'_COS_SECRET_KEY', 'COS_SECRET_KEY']),
                downloadDomain: requireEnv(env, [pk+'_COS_DOWNLOAD_DOMAIN', 'COS_DOWNLOAD_DOMAIN']),
              };
            }
            async function run() {
              const client = new pg.Client({ connectionString: process.env.DATABASE_URL });
              await client.connect();
              for (const t of [
                { projectKey: 'laicai', runtimeEnv: 'dev' },
                { projectKey: 'laicai', runtimeEnv: 'prd' },
                { projectKey: 'infov', runtimeEnv: 'dev' },
                { projectKey: 'infov', runtimeEnv: 'prd' },
              ]) {
                const config = resolveConfig(t.projectKey, t.runtimeEnv, process.env);
                const configJson = JSON.stringify(config);
                await client.query(
                  `INSERT INTO project_service_bindings (id, project_key, runtime_env, service_type, provider, config, created_at, updated_at)
                   VALUES ($1, $2, $3, 'object_storage', 'cos', $4, NOW(), NOW())
                   ON CONFLICT (project_key, runtime_env, service_type)
                   DO UPDATE SET config = EXCLUDED.config, provider = EXCLUDED.provider, updated_at = NOW()`,
                  [crypto.randomUUID(), t.projectKey, t.runtimeEnv, configJson],
                );
              }
              await client.end();
              console.log('[OK] Seed complete');
            }
            run().catch(e => { console.error('[FAIL] Seed failed:', e.message); process.exit(1); });
            NODE
            echo "[OK] Seed done" | tee -a $LOG_FILE

            # 6. Health check
            sleep 5
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3010/health || echo "000")
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "[OK] Health check passed (HTTP $HTTP_STATUS)" | tee -a $LOG_FILE
            else
              echo "[FAIL] Health check returned HTTP $HTTP_STATUS" | tee -a $LOG_FILE
              docker compose -f srs/infra/docker-compose.yml logs api --tail 20 2>&1 | tee -a $LOG_FILE
              exit 1
            fi

            # 7. Verify worker is running
            WORKER_STATUS=$(docker compose -f srs/infra/docker-compose.yml ps worker --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1 || echo "unknown")
            echo "[INFO] Worker status: $WORKER_STATUS" | tee -a $LOG_FILE

            # 8. Clean up old images
            docker image prune -f 2>&1 | tee -a $LOG_FILE

            echo "=== Deploy finished at $(date '+%Y-%m-%d %H:%M:%S') ===" | tee -a $LOG_FILE

      - name: Cleanup local secrets artifact
        if: always()
        run: rm -f env.runtime
