name: Deploy to Production

# main 是 release branch；日常开发默认分支为 dev。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 20

    steps:
      - name: Record runner info
        run: |
          echo "=== Runner Info ==="
          echo "Runner IP: $(curl -s https://api.ipify.org)"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "GitHub SHA: $GITHUB_SHA"
          echo "GitHub ref: $GITHUB_REF"
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "==================="

      - name: Fetch secrets from Vault
        env:
          VAULT_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN_JOYA_DEVKIT_PROD }}
          INFISICAL_PROJECT_ID_JOYA_DEVKIT: 3d835c43-59e7-4b4f-bf98-466f5585fe53
          OUTPUT_PATH: env.runtime
        run: bash scripts/gen-env-runtime.sh prod

      - name: Upload .env.runtime to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "env.runtime"
          target: "/home/ubuntu/apps/joya-devkit/srs/infra/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /home/ubuntu/apps/joya-devkit
            git fetch origin main
            git reset --hard origin/main
            bash srs/scripts/deploy-remote-ssh.sh prod

      - name: Cleanup local secrets artifact
        if: always()
        run: rm -f env.runtime
