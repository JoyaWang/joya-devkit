name: Deploy to Production

# main 是 release branch；日常开发默认分支为 dev。
on:
  workflow_dispatch:
    inputs:
      rotate_laicai_service_token:
        description: "Rotate Laicai SRS service token from temporary GitHub secret into SRS Vault"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Record runner info
        run: |
          echo "=== Runner Info ==="
          echo "Runner IP: $(curl -s https://api.ipify.org)"
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "GitHub SHA: $GITHUB_SHA"
          echo "GitHub ref: $GITHUB_REF"
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "==================="

      - name: Fetch secrets from Vault
        env:
          VAULT_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN_JOYA_DEVKIT_PROD }}
          INFISICAL_PROJECT_ID_JOYA_DEVKIT: 3d835c43-59e7-4b4f-bf98-466f5585fe53
          OUTPUT_PATH: env.runtime
        run: bash scripts/gen-env-runtime.sh prod

      - name: Rotate Laicai SRS service token
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rotate_laicai_service_token }}
        env:
          LAICAI_SRS_SERVICE_TOKEN_ROTATION: ${{ secrets.LAICAI_SRS_SERVICE_TOKEN_ROTATION }}
          VAULT_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN_JOYA_DEVKIT_PROD }}
          INFISICAL_PROJECT_ID_JOYA_DEVKIT: 3d835c43-59e7-4b4f-bf98-466f5585fe53
        run: |
          set -euo pipefail
          python3 scripts/rotate-laicai-service-token.py --env prod --env-file env.runtime

      - name: Build SRS Docker image bundle
        run: bash scripts/build-srs-image-bundle.sh --image-tag "${{ github.sha }}" --output-dir incoming

      - name: Prepare runtime artifact
        run: |
          set -euo pipefail
          mkdir -p incoming/srs/infra
          cp env.runtime incoming/srs/infra/env.runtime

      - name: Upload deploy artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "incoming/srs-images-${{ github.sha }}.tar.gz,incoming/srs/infra/env.runtime"
          target: "/home/ubuntu/apps/joya-devkit/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /home/ubuntu/apps/joya-devkit
            bash srs/scripts/deploy-remote-ssh.sh prod --skip-code-pull --image-bundle incoming/srs-images-${{ github.sha }}.tar.gz --image-tag ${{ github.sha }}

      - name: Cleanup local secrets artifact
        if: always()
        run: rm -f env.runtime incoming/srs-images-${{ github.sha }}.tar.gz
