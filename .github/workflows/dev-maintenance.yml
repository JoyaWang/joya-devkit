name: Dev Maintenance

# Scheduled cleanup runs on the dev server itself via cron:
# /opt/joya-governance/bin/joya-devkit-docker-cleanup.sh
# This workflow is informational only and must not SSH into the server.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-maintenance
  cancel-in-progress: false

jobs:
  maintenance-info:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Show server-side maintenance entrypoint
        run: |
          echo "Dev Docker cleanup is executed on the server via cron."
          echo "Script: /opt/joya-governance/bin/joya-devkit-docker-cleanup.sh"
          echo "Log: /opt/joya-governance/log/joya-devkit-maintenance.log"
          echo "This workflow does not open SSH connections."
